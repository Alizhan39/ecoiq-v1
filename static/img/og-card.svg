<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080e"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <!-- Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
    <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(16,185,129,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(96, 72)">
    <rect width="56" height="56" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <!-- Bar chart icon -->
    <rect x="10" y="32" width="8" height="14" rx="2" fill="#10b981" opacity="0.6"/>
    <rect x="24" y="22" width="8" height="24" rx="2" fill="#10b981" opacity="0.8"/>
    <rect x="38" y="14" width="8" height="32" rx="2" fill="#10b981"/>
  </g>

  <!-- Wordmark -->
  <text x="168" y="111" font-family="system-ui,-apple-system,sans-serif" font-size="40"
        font-weight="800" letter-spacing="-1" fill="white">EcoIQ</text>

  <!-- Divider -->
  <line x1="96" y1="160" x2="1104" y2="160" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Headline -->
  <text x="96" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="60"
        font-weight="800" letter-spacing="-2" fill="white">Ethical Intelligence for</text>
  <text x="96" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="60"
        font-weight="800" letter-spacing="-2" fill="#10b981">Industrial Modernization</text>

  <!-- Subtext -->
  <text x="96" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="24"
        fill="rgba(148,163,184,0.9)">AI diagnostics · ESG scoring · Modernization roadmaps</text>

  <!-- Divider -->
  <line x1="96" y1="490" x2="1104" y2="490" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Footer tags -->
  <text x="96" y="545" font-family="system-ui,-apple-system,sans-serif" font-size="18"
        fill="rgba(100,116,139,0.9)">Oil &amp; Gas  ·  Manufacturing  ·  Chemicals  ·  Mining  ·  Logistics  ·  Utilities</text>

  <!-- Domain -->
  <text x="1104" y="545" font-family="system-ui,-apple-system,sans-serif" font-size="18"
        font-weight="600" fill="rgba(16,185,129,0.7)" text-anchor="end">ecoiq.uk</text>
</svg>
