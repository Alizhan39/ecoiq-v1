<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="EcoIQ">
  <title>EcoIQ</title>
  <!--
    EcoIQ Icon — "The Lattice"
    ∙ Hexagon  = 6 scoring pillars, systematic structure, precision
    ∙ Triangle = environmental delta (Δ), change, measurement, upward momentum
    ∙ Center   = the intelligence focal point (IQ score node)
  -->

  <!-- Dark institutional background -->
  <rect width="100" height="100" rx="22" fill="#070b0f"/>

  <!-- Subtle grid lines (data infrastructure feel) -->
  <line x1="50" y1="0" x2="50" y2="100" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
  <line x1="0" y1="50" x2="100" y2="50" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

  <!-- Outer hexagon — pointy-top, center (50,50), radius 40 -->
  <!-- Vertices: top(50,10) top-right(84.6,30) bottom-right(84.6,70)
                 bottom(50,90) bottom-left(15.4,70) top-left(15.4,30) -->
  <polygon
    points="50,10 84.6,30 84.6,70 50,90 15.4,70 15.4,30"
    fill="none"
    stroke="#00e89a"
    stroke-width="2.8"
    stroke-linejoin="round"
  />

  <!-- Inner upward triangle — center (50,50), radius 22 -->
  <!-- Vertices: top(50,28) bottom-right(69,61) bottom-left(31,61) -->
  <!-- Centroid = (50,50) — perfectly centered -->
  <polygon
    points="50,28 69,61 31,61"
    fill="rgba(0,232,154,0.055)"
    stroke="#00e89a"
    stroke-width="2"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Center intelligence node -->
  <circle cx="50" cy="50" r="5.5" fill="#00e89a"/>

  <!-- Subtle corner accent dots at three alternating hex vertices (top + bottom-left + bottom-right) -->
  <circle cx="50"  cy="10" r="2" fill="#00e89a" opacity="0.5"/>
  <circle cx="15.4" cy="70" r="2" fill="#00e89a" opacity="0.5"/>
  <circle cx="84.6" cy="70" r="2" fill="#00e89a" opacity="0.5"/>
</svg>
