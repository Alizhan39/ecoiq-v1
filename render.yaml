# ══════════════════════════════════════════════════════════════════════════════
# EcoIQ — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Services:
#   ecoiq       — Django/Gunicorn web service (starter plan, Oregon)
#   ecoiq-db    — PostgreSQL database (starter plan, Oregon)
#
# build.sh is DB-FREE — the build environment cannot reach the private database
# network (the internal hostname dpg-…-a only resolves at runtime). Migrations +
# seeding run at runtime via the Pre-Deploy Command (predeploy.sh) and start.sh,
# both best-effort, so a temporarily-unavailable database never blocks a deploy.
# Secrets (ANTHROPIC_API_KEY, COMPANIES_HOUSE_API_KEY) must be set
# manually in the Render dashboard — they are never committed to git.
# ══════════════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: ecoiq                          # Blueprint matches by this name — do NOT rename
    env: python
    region: oregon
    plan: starter                        # $7/month — persistent disk, no cold starts
    buildCommand: pip install -r requirements.txt && ./build.sh
    # Pre-Deploy runs once per deploy in the runtime network (internal DB hostname
    # resolves here) — migrations + seeding live here, not in the build.
    preDeployCommand: ./predeploy.sh
    # start.sh runs a fast best-effort migrate (safety net) then launches Gunicorn.
    # 1 worker, 4 threads (gthread) — Render Starter plan is 512 MB RAM.
    # gthread lets 4 requests run concurrently (I/O overlap) without forking
    # a second full Python process. max-requests recycles the worker after
    # 300 requests to prevent WeasyPrint PDF memory from accumulating.
    startCommand: ./start.sh

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: WEB_CONCURRENCY
        value: "1"                       # belt-and-suspenders: matches --workers above

      - key: DEBUG
        value: "False"                   # always False in production

      - key: DJANGO_SETTINGS_MODULE
        value: ecoiq.settings

      - key: DJANGO_SECRET_KEY
        generateValue: true              # Render generates and rotates this automatically

      - key: ALLOWED_HOSTS
        value: "*"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecoiq.onrender.com,https://ecoiq.uk,https://www.ecoiq.uk"

      - key: SITE_URL
        value: "https://ecoiq.uk"

      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db                 # links to the database service below
          property: connectionString

      - key: ANTHROPIC_API_KEY
        sync: false                      # set manually in Render dashboard — never in git

      - key: COMPANIES_HOUSE_API_KEY
        sync: false                      # set manually in Render dashboard — never in git

# REDIS_URL is intentionally NOT added as a live env var above — see the
# Backend Intelligence Engine block at the end of this file for why, and
# what to add (to both this service and the new worker) to enable it.

# ── Database ──────────────────────────────────────────────────────────────────
databases:
  - name: ecoiq-db
    databaseName: ecoiq
    user: ecoiq
    plan: starter                        # $7/month PostgreSQL — 1 GB storage
    region: oregon                       # same region as web service for low latency

# ══════════════════════════════════════════════════════════════════════════════
# Backend Intelligence Engine (Celery + Redis) — NOT enabled by default.
#
# Uncomment the two blocks below to actually run background tasks in
# production. This is a real, additional cost decision, not something that
# should ship silently as a side effect of this PR:
#   - a Render Key Value (Redis) instance: from ~$10/month (Starter)
#   - a Render Background Worker running `celery -A ecoiq worker`: from
#     ~$7/month (Starter, same plan tier as the web service)
#
# Until uncommented, `python manage.py shell` / management commands can still
# call a task's `.apply()` (synchronous, in-process, no broker needed) —
# only `.delay()`/`.apply_async()` require these services to actually exist.
#
# services:
#   - type: redis
#     name: ecoiq-redis
#     region: oregon
#     plan: starter
#     ipAllowList: []                    # internal-only — no public network access
#
#   - type: worker
#     name: ecoiq-celery-worker
#     env: python
#     region: oregon
#     plan: starter
#     buildCommand: pip install -r requirements.txt
#     startCommand: celery -A ecoiq worker --loglevel=info --concurrency=2 --max-tasks-per-child=100
#     envVars:
#       - key: PYTHON_VERSION
#         value: "3.11.0"
#       - key: DJANGO_SETTINGS_MODULE
#         value: ecoiq.settings
#       - key: DJANGO_SECRET_KEY
#         sync: false                    # copy the same value as the `ecoiq` web service
#       - key: DATABASE_URL
#         fromDatabase:
#           name: ecoiq-db
#           property: connectionString
#       - key: REDIS_URL
#         fromService:
#           name: ecoiq-redis
#           type: redis
#           property: connectionString
#       - key: ANTHROPIC_API_KEY
#         sync: false
# ══════════════════════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════════════════════
# Continuous Stewardship Monitor (scheduled refresh) — NOT enabled by default.
#
# Uncomment to actually run a periodic Stewardship Universe refresh in
# production. This is a real, additional Render cron-job cost decision, not
# something that should ship silently as a side effect of this PR — same
# discipline as the Celery block above. Until uncommented, "scheduled
# refresh" only happens if you invoke the management command yourself
# (manually, or via your own external scheduler) — no claim of "continuous
# monitoring" is made unless this (or an equivalent scheduler) is genuinely
# running. --due-only means each company/source is only actually re-fetched
# per its own refresh_policy interval, however often this job itself ticks;
# --scheduled records the honest triggered_by='scheduled' provenance on
# every CompanyRefreshRun this produces, and gates per-source fetches to
# only those refresh_policy says are actually due (never re-hammers a
# provider just because the cron ticked).
#
# services:
#   - type: cron
#     name: ecoiq-stewardship-monitor
#     env: python
#     region: oregon
#     plan: starter
#     schedule: "0 6 * * *"              # once daily, 06:00 UTC — adjust to taste
#     buildCommand: pip install -r requirements.txt
#     startCommand: python manage.py refresh_stewardship_universe --due-only --scheduled --limit 50
#     envVars:
#       - key: PYTHON_VERSION
#         value: "3.11.0"
#       - key: DJANGO_SETTINGS_MODULE
#         value: ecoiq.settings
#       - key: DJANGO_SECRET_KEY
#         sync: false                    # copy the same value as the `ecoiq` web service
#       - key: DATABASE_URL
#         fromDatabase:
#           name: ecoiq-db
#           property: connectionString
#       - key: COMPANIES_HOUSE_API_KEY
#         sync: false
# ══════════════════════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════════════════════
# Good While You Sleep — 114 Good Agents overnight discovery — NOT enabled by
# default. SCHEDULER READY, not SCHEDULER ACTIVE (see docs/GOOD_WHILE_YOU_SLEEP.md)
# until this block is uncommented — same discipline as the two blocks above.
#
# Fetches from the 3 real, bounded public SignalProviders (USGS significant
# earthquakes, GOV.UK grant/funding search, UK Environment Agency flood
# monitoring — see good_agents/services/provider_adapters.py), runs every
# enabled GoodMission through the GlobalGoodDiscoveryEngine, and prints the
# Morning Brief. Idempotent per (mission, run-date): re-running the same day
# is a no-op for any mission that already completed. One provider's failure
# never stops the others (see good_agents/services/ingestion.py).
#
# services:
#   - type: cron
#     name: ecoiq-good-while-you-sleep
#     env: python
#     region: oregon
#     plan: starter
#     schedule: "0 5 * * *"              # once daily, 05:00 UTC — adjust to taste
#     buildCommand: pip install -r requirements.txt
#     startCommand: python manage.py run_good_while_you_sleep
#     envVars:
#       - key: PYTHON_VERSION
#         value: "3.11.0"
#       - key: DJANGO_SETTINGS_MODULE
#         value: ecoiq.settings
#       - key: DJANGO_SECRET_KEY
#         sync: false                    # copy the same value as the `ecoiq` web service
#       - key: DATABASE_URL
#         fromDatabase:
