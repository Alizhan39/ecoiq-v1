services:
  - type: web
    name: ecoiq
    env: python
    region: oregon          # or frankfurt for EU
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn ecoiq.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --log-file -"
    healthCheckPath: /

    envVars:
      # Auto-wired from the PostgreSQL database below
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString

      # Render auto-generates a strong random value for SECRET_KEY
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      # IMPORTANT: update these to your actual Render URL after first deploy
      # Format: "ecoiq.onrender.com"  (no https://, space-separated if multiple)
      - key: ALLOWED_HOSTS
        value: "ecoiq.onrender.com"

      # Format: "https://ecoiq.onrender.com"  (with https://)
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecoiq.onrender.com"

      # Set this manually in the Render dashboard — never commit the real key
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: ecoiq-db
    databaseName: ecoiq
    user: ecoiq
    plan: free
    region: oregon
