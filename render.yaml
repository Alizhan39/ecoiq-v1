services:
  - type: web
    name: ecoiq
    env: python
    region: oregon          # or frankfurt for EU
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn ecoiq.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --log-file -"
    healthCheckPath: /

    envVars:
      # Auto-wired from the PostgreSQL database below
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString

      # Render auto-generates a strong random value for SECRET_KEY
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      # Wildcard allows all hosts — safe behind Render's reverse proxy.
      - key: ALLOWED_HOSTS
        value: "*"

      # Full HTTPS origins — comma or space separated.
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecoiq.onrender.com,https://ecoiq.uk,https://www.ecoiq.uk"

      # Public URL used in og:image and share links
      - key: SITE_URL
        value: "https://ecoiq.uk"

      # Set manually in the Render dashboard — never commit the real key
      - key: ANTHROPIC_API_KEY
        sync: false

      # Companies House UK — free key at developer.companieshouse.gov.uk
      - key: COMPANIES_HOUSE_API_KEY
        sync: false

  # ── Cron: Daily yFinance refresh (6:00 UTC) ────────────────────────────────
  - type: cron
    name: ecoiq-daily-yfinance
    env: python
    region: oregon
    schedule: "0 6 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py run_ingestion --source=yfinance"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

  # ── Cron: RSS signals every 4 hours ───────────────────────────────────────
  - type: cron
    name: ecoiq-rss-signals
    env: python
    region: oregon
    schedule: "0 */4 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py run_ingestion --source=rss"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

  # ── Cron: Full pipeline weekly (Sunday 02:00 UTC) ─────────────────────────
  - type: cron
    name: ecoiq-weekly-full-ingest
    env: python
    region: oregon
    schedule: "0 2 * * 0"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py run_ingestion --source=all"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: COMPANIES_HOUSE_API_KEY
        sync: false

  # ── Cron: ML model retraining (Monday 03:00 UTC, after weekly ingest) ────
  - type: cron
    name: ecoiq-ml-retrain
    env: python
    region: oregon
    schedule: "0 3 * * 1"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py train_ml_models --apply"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: ecoiq-db
    databaseName: ecoiq
    user: ecoiq
    plan: free
    region: oregon
