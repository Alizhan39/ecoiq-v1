services:
  - type: web
    name: ecoiq-v1
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && ./build.sh
    startCommand: gunicorn ecoiq.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: ecoiq.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecoiq.onrender.com,https://ecoiq.uk,https://www.ecoiq.uk"
      - key: SITE_URL
        value: "https://ecoiq.uk"
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COMPANIES_HOUSE_API_KEY
        sync: false

databases:
  - name: ecoiq-db
    databaseName: ecoiq
    user: ecoiq
    plan: starter
    region: oregon
