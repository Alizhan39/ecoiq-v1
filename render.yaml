services:
  - type: web
    name: ecoiq
    env: python
    region: oregon          # or frankfurt for EU
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn ecoiq.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --log-file -"
    healthCheckPath: /

    envVars:
      # Auto-wired from the PostgreSQL database below
      - key: DATABASE_URL
        fromDatabase:
          name: ecoiq-db
          property: connectionString

      # Render auto-generates a strong random value for SECRET_KEY
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      # Wildcard allows all hosts — safe behind Render's reverse proxy.
      # For tighter control replace with: "ecoiq.onrender.com ecoiq.uk www.ecoiq.uk"
      # Comma-separated also works: "ecoiq.onrender.com,ecoiq.uk,www.ecoiq.uk"
      - key: ALLOWED_HOSTS
        value: "*"

      # Full HTTPS origins — comma or space separated. No wildcards here.
      # Add every domain that will send POST requests (login, forms).
      # Example: "https://ecoiq.onrender.com,https://ecoiq.uk,https://www.ecoiq.uk"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ecoiq.onrender.com,https://ecoiq.uk,https://www.ecoiq.uk"

      # Public URL used in og:image and share links
      - key: SITE_URL
        value: "https://ecoiq.uk"

      # Set this manually in the Render dashboard — never commit the real key
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: ecoiq-db
    databaseName: ecoiq
    user: ecoiq
    plan: free
    region: oregon
