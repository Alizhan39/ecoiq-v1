<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — EcoIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .grid-bg {
      background-image:
        linear-gradient(rgba(16,185,129,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,.02) 1px, transparent 1px);
      background-size: 64px 64px;
    }
  </style>
</head>
<body class="min-h-screen bg-[#06080e] text-white flex items-center justify-center relative overflow-hidden">

  <!-- Background -->
  <div class="absolute inset-0 grid-bg opacity-60 pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full pointer-events-none"
       style="background: radial-gradient(circle, rgba(16,185,129,.07) 0%, transparent 70%);
              top: 50%; left: 50%; transform: translate(-50%,-50%);"></div>

  <div class="relative w-full max-w-sm px-5">

    <!-- Logo -->
    <div class="text-center mb-10">
      <a href="/" class="inline-flex items-center gap-2.5 group">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
             style="background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.3);">
          <svg class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <span class="text-lg font-black tracking-tight text-white">EcoIQ</span>
      </a>
      <p class="text-slate-500 text-sm mt-3">Internal platform — authorised access only</p>
    </div>

    <!-- Card -->
    <div style="background: rgba(255,255,255,.032); border: 1px solid rgba(255,255,255,.065);
                backdrop-filter: blur(14px); border-radius: 1rem; padding: 2rem;">

      <h1 class="text-lg font-bold text-white mb-6">Sign in</h1>

      {% if form.errors %}
      <div class="mb-4 px-4 py-3 rounded-lg text-sm text-red-300"
           style="background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);">
        Username or password incorrect. Please try again.
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-4">
          <label class="block text-xs text-slate-400 font-semibold mb-1.5 uppercase tracking-wider"
                 for="id_username">Username</label>
          <input type="text"
                 name="username" id="id_username"
                 autocomplete="username"
                 autofocus
                 class="w-full px-4 py-3 rounded-xl text-sm text-white outline-none transition-colors"
                 style="background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);"
                 onfocus="this.style.borderColor='rgba(16,185,129,.5)'"
                 onblur="this.style.borderColor='rgba(255,255,255,.1)'"
          />
        </div>

        <div class="mb-6">
          <label class="block text-xs text-slate-400 font-semibold mb-1.5 uppercase tracking-wider"
                 for="id_password">Password</label>
          <input type="password"
                 name="password" id="id_password"
                 autocomplete="current-password"
                 class="w-full px-4 py-3 rounded-xl text-sm text-white outline-none transition-colors"
                 style="background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);"
                 onfocus="this.style.borderColor='rgba(16,185,129,.5)'"
                 onblur="this.style.borderColor='rgba(255,255,255,.1)'"
          />
        </div>

        {% if next %}
        <input type="hidden" name="next" value="{{ next }}" />
        {% endif %}

        <button type="submit"
                class="w-full py-3 rounded-xl font-bold text-sm text-black transition-colors"
                style="background: #10b981;"
                onmouseover="this.style.background='#34d399'"
                onmouseout="this.style.background='#10b981'">
          Sign In →
        </button>
      </form>

    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      <a href="/" class="hover:text-slate-400 transition-colors">← Back to ecoiq.uk</a>
    </p>

  </div>
</body>
</html>
