<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — EcoIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      background: #06080e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      margin: 0;
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(16,185,129,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,.02) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .login-bg {
      position: absolute; inset: 0; opacity: .6; pointer-events: none;
    }
    .login-orb {
      position: absolute; width: 600px; height: 600px; border-radius: 50%; pointer-events: none;
      background: radial-gradient(circle, rgba(16,185,129,.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .login-wrap { position: relative; width: 100%; max-width: 24rem; padding: 0 1.25rem; }

    .login-logo-link { display: inline-flex; align-items: center; gap: .625rem; text-decoration: none; }
    .login-logo-mark {
      width: 2rem; height: 2rem; border-radius: .5rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.3);
    }
    .login-logo-mark svg { width: 1rem; height: 1rem; color: #34d399; }
    .login-logo-text { font-size: 1.125rem; font-weight: 900; letter-spacing: -0.02em; color: #fff; }
    .login-logo { text-align: center; margin-bottom: 2.5rem; }
    .login-tagline { color: #64748b; font-size: .875rem; margin: .75rem 0 0; }

    .login-card {
      background: rgba(255,255,255,.032); border: 1px solid rgba(255,255,255,.065);
      backdrop-filter: blur(14px); border-radius: 1rem; padding: 2rem;
    }
    .login-title { font-size: 1.125rem; font-weight: 700; color: #fff; margin: 0 0 1.5rem; }

    .login-error {
      margin-bottom: 1rem; padding: .75rem 1rem; border-radius: .5rem; font-size: .875rem; color: #fca5a5;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
    }

    .login-field { margin-bottom: 1rem; }
    .login-field:last-of-type { margin-bottom: 1.5rem; }
    .login-label {
      display: block; font-size: .75rem; color: #94a3b8; font-weight: 600; margin-bottom: .375rem;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .login-input {
      width: 100%; padding: .75rem 1rem; border-radius: .75rem; font-size: .875rem; color: #fff;
      outline: none; transition: border-color .15s;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    }

    .login-submit {
      width: 100%; padding: .75rem 0; border-radius: .75rem; font-weight: 700; font-size: .875rem;
      color: #000; border: none; cursor: pointer; transition: background-color .15s;
      background: #10b981;
    }
    .login-submit:hover { background: #34d399; }

    .login-footer { text-align: center; color: #475569; font-size: .75rem; margin-top: 1.5rem; }
    .login-footer a { color: inherit; text-decoration: none; transition: color .15s; }
    .login-footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="login-bg grid-bg"></div>
  <div class="login-orb"></div>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
      <a href="/" class="login-logo-link">
        <div class="login-logo-mark">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <span class="login-logo-text">EcoIQ</span>
      </a>
      <p class="login-tagline">Internal platform — authorised access only</p>
    </div>

    <!-- Card -->
    <div class="login-card">

      <h1 class="login-title">Sign in</h1>

      {% if form.errors %}
      <div class="login-error">
        Username or password incorrect. Please try again.
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="login-field">
          <label class="login-label" for="id_username">Username</label>
          <input type="text"
                 name="username" id="id_username"
                 autocomplete="username"
                 autofocus
                 class="login-input"
                 onfocus="this.style.borderColor='rgba(16,185,129,.5)'"
                 onblur="this.style.borderColor='rgba(255,255,255,.1)'"
          />
        </div>

        <div class="login-field">
          <label class="login-label" for="id_password">Password</label>
          <input type="password"
                 name="password" id="id_password"
                 autocomplete="current-password"
                 class="login-input"
                 onfocus="this.style.borderColor='rgba(16,185,129,.5)'"
                 onblur="this.style.borderColor='rgba(255,255,255,.1)'"
          />
        </div>

        {% if next %}
        <input type="hidden" name="next" value="{{ next }}" />
        {% endif %}

        <button type="submit" class="login-submit">
          Sign In →
        </button>
      </form>

    </div>

    <p class="login-footer">
      <a href="/">← Back to ecoiq.uk</a>
    </p>

  </div>
</body>
</html>
