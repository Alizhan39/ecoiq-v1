<style>
  /* Capital Guardian reuses gold_intelligence's --gold-* tokens (included
     alongside this file on every page) for visual consistency — these are
     only the genuinely new UI patterns Capital Guardian needs. */
  .gc-synthetic-banner {
    display: flex; align-items: center; gap: 0.6rem; background: rgba(244,162,97,.08);
    border: 1px solid rgba(244,162,97,.35); border-radius: 8px; padding: 0.7rem 1rem;
    margin: 1rem 0; font-family: 'SF Mono', monospace; font-size: 0.76rem; color: #f4a261; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  .gc-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 0.3rem; margin: 1.2rem 0; max-width: 100%; }
  .gc-flow-step {
    background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 999px;
    padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 700; color: var(--gold-text);
    white-space: normal; overflow-wrap: break-word; max-width: 100%;
  }
  .gc-flow-step.done { border-color: var(--gold-acc); color: var(--gold-acc); }
  .gc-flow-step.pending { color: var(--gold-muted); }
  .gc-flow-arrow { color: var(--gold-muted); }
  .gc-flow.vertical { flex-direction: column; align-items: flex-start; }
  .gc-flow.vertical .gc-flow-arrow { margin-left: 1.2rem; }

  .gc-gauges { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.9rem; }
  .gc-gauge-card { background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 12px; padding: 0.5rem; overflow-x: auto; }

  .gc-process-stages { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1.2rem 0; }
  .gc-process-stage {
    background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 10px;
    padding: 0.7rem 1.1rem; cursor: pointer; font-weight: 700; color: var(--gold-text); font-size: 0.85rem;
    min-height: 44px;
  }
  .gc-process-stage.active { border-color: var(--gold-acc); color: var(--gold-acc); background: rgba(212,175,55,.08); }
  .gc-process-detail { background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 12px; padding: 1.2rem; margin-top: 1rem; }
  .gc-process-detail[hidden] { display: none; }

  .gc-metric-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.7rem; margin: 1rem 0; }
  .gc-metric { background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 10px; padding: 0.8rem 1rem; }
  .gc-metric-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gold-muted); }
  .gc-metric-value { font-family: 'SF Mono', monospace; font-size: 1.2rem; font-weight: 800; color: #fff; margin-top: 0.2rem; }
  .gc-env-status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 0.4rem; }
  .gc-env-status.green { background: var(--gold-acc); }
  .gc-env-status.amber { background: var(--gold-medium); }
  .gc-env-status.red { background: var(--gold-high); }

  .gc-flag-card { background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.8rem; border-left: 4px solid var(--gold-muted); }
  .gc-flag-card.high { border-left-color: var(--gold-high); }
  .gc-flag-card.medium { border-left-color: var(--gold-medium); }
  .gc-flag-card.low { border-left-color: var(--gold-low); }
  .gc-flag-head { display: flex; justify-content: space-between; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .gc-flag-meta { font-family: 'SF Mono', monospace; font-size: 0.7rem; color: var(--gold-muted); margin-top: 0.4rem; }

  @media (max-width: 760px) {
    .gc-process-stages { flex-direction: column; }
    .gc-process-stage { width: 100%; }
  }

  /* Phase 2 */
  .gc-compare-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 900px; }
  .gc-compare-table th { text-align: left; font-size: 0.66rem; text-transform: uppercase; letter-spacing: .04em; color: var(--gold-muted); padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--gold-border); white-space: nowrap; }
  .gc-compare-table td { padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--gold-border); color: var(--gold-text); white-space: nowrap; }
  .gc-compare-table tbody tr:hover { background: rgba(255,255,255,.02); }
  .gc-compare-table a { color: var(--gold-acc); text-decoration: none; font-weight: 700; }

  .gc-evidence-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.5rem; background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.6rem; }
  .gc-evidence-field-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gold-muted); }
  .gc-evidence-field-value { font-size: 0.82rem; color: var(--gold-text); margin-top: 0.15rem; }
  .gc-tier-badge { display: inline-block; font-family: 'SF Mono', monospace; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid var(--gold-border); color: var(--gold-muted); }
  .gc-tier-badge.human_reviewed, .gc-tier-badge.independently_verified { color: var(--gold-acc); border-color: var(--gold-acc); }

  .gc-audit-timeline { position: relative; padding-left: 1.4rem; border-left: 2px solid var(--gold-border); }
  .gc-audit-entry { position: relative; margin-bottom: 1.1rem; }
  .gc-audit-entry::before { content: ''; position: absolute; left: -1.72rem; top: 0.25rem; width: 10px; height: 10px; border-radius: 50%; background: var(--gold-acc); }
  .gc-audit-time { font-family: 'SF Mono', monospace; font-size: 0.68rem; color: var(--gold-muted); }
  .gc-audit-body { background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 10px; padding: 0.7rem 0.9rem; margin-top: 0.3rem; }

  /* Phase 3 */
  .gc-nav-groups { display: flex; flex-direction: column; gap: 0.9rem; margin: 1.4rem 0 2rem; border-bottom: 1px solid var(--gold-border); padding-bottom: 1.2rem; }
  .gc-nav-group { display: flex; align-items: baseline; gap: 0.9rem; flex-wrap: wrap; }
  .gc-nav-group-label { font-family: 'SF Mono', monospace; font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-acc); min-width: 72px; }
  .gc-nav-group-row { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  @media (max-width: 760px) {
    .gc-nav-group { flex-direction: column; gap: 0.3rem; }
  }

  .gc-status-badge { display: inline-block; font-family: 'SF Mono', monospace; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.08em; padding: 0.2rem 0.7rem; border-radius: 999px; background: rgba(0,232,154,.12); border: 1px solid rgba(0,232,154,.4); color: var(--gold-acc); margin-left: 0.6rem; }

  .gc-disclaimer-banner { display: flex; align-items: flex-start; gap: 0.6rem; background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.35); border-radius: 8px; padding: 0.8rem 1rem; margin: 1rem 0; font-family: 'SF Mono', monospace; font-size: 0.72rem; color: #58a6ff; font-weight: 700; letter-spacing: 0.03em; overflow-wrap: break-word; word-break: break-word; min-width: 0; }

  .gc-isometric-plant { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.7rem; margin: 1.2rem 0; perspective: 900px; }
  .gc-iso-zone {
    background: linear-gradient(145deg, var(--gold-bg2), rgba(255,255,255,.02)); border: 1px solid var(--gold-border);
    border-radius: 10px; padding: 0.9rem 1rem; cursor: pointer; transform: rotateX(6deg);
    transition: transform .15s ease, border-color .15s ease; min-height: 64px;
  }
  .gc-iso-zone:hover { transform: rotateX(6deg) translateY(-3px); border-color: var(--gold-acc); }
  .gc-iso-zone.active { border-color: var(--gold-acc); background: rgba(212,175,55,.1); }
  .gc-iso-zone-label { font-weight: 800; color: #fff; font-size: 0.85rem; }
  .gc-iso-zone-sub { font-size: 0.66rem; color: var(--gold-muted); margin-top: 0.2rem; }
  @media (max-width: 760px) {
    .gc-isometric-plant { grid-template-columns: repeat(2, 1fr); perspective: none; }
    .gc-iso-zone { transform: none; }
    .gc-iso-zone:hover { transform: none; }
  }

  .gc-camera-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.9rem; }
  .gc-camera-tile { background: #000; border: 1px solid var(--gold-border); border-radius: 10px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .gc-camera-tile-label { position: absolute; top: 0.5rem; left: 0.6rem; font-family: 'SF Mono', monospace; font-size: 0.66rem; font-weight: 700; color: var(--gold-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .gc-camera-tile-empty { color: var(--gold-muted); font-size: 0.72rem; text-align: center; padding: 0 1rem; }
  .gc-camera-tile-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold-muted); display: inline-block; margin-right: 0.4rem; }

  .gc-briefing-section { background: var(--gold-bg2); border: 1px solid var(--gold-border); border-radius: 12px; padding: 1.1rem 1.3rem; margin-bottom: 0.9rem; }
  .gc-briefing-section h3 { margin: 0 0 0.6rem; color: #fff; font-size: 0.95rem; }
  .gc-briefing-line { font-size: 0.85rem; color: var(--gold-text); padding: 0.35rem 0; border-bottom: 1px solid var(--gold-border); }
  .gc-briefing-line:last-child { border-bottom: none; }

  .gc-rating-bar-track { background: rgba(255,255,255,.06); border-radius: 999px; height: 8px; width: 100%; overflow: hidden; }
  .gc-rating-bar-fill { background: var(--gold-acc); height: 100%; border-radius: 999px; }

</style>
