<style>
  :root {
    --ds-bg: #070b0f; --ds-bg2: #0d1117; --ds-border: rgba(255,255,255,.08);
    --ds-text: #e2e8f0; --ds-muted: #94a3b8; --ds-acc: #00e89a; --ds-info: #58a6ff;
    --ds-warn: #f4a261; --ds-danger: #e63946; --ds-purple: #a855f7; --ds-cyan: #06b6d4;
  }
  .ds-wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; background: var(--ds-bg); color: var(--ds-text); border-radius: 14px; }
  .ds-badge { display: inline-block; background: rgba(0,232,154,.12); color: var(--ds-acc); border: 1px solid rgba(0,232,154,.3); font-weight: 700; font-size: 0.78rem; padding: 0.35rem 0.85rem; border-radius: 999px; margin-bottom: 1rem; }
  .ds-title { font-size: 2rem; font-weight: 800; margin: 0.4rem 0 0.6rem; color: #fff; letter-spacing: -0.02em; }
  .ds-subtitle { font-size: 1.02rem; color: var(--ds-muted); margin: 0 0 1.5rem; max-width: 760px; line-height: 1.6; }

  .ds-ask-form { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.2rem; }
  .ds-ask-input { flex: 1; min-width: 260px; background: var(--ds-bg2); color: #fff; border: 1px solid var(--ds-border); border-radius: 10px; padding: 0.9rem 1.1rem; font-size: 1rem; }
  .ds-ask-input:focus { outline: none; border-color: var(--ds-acc); }
  .ds-suggested-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
  .ds-suggested-chip { background: var(--ds-bg2); border: 1px solid var(--ds-border); color: var(--ds-text); font-size: 0.8rem; font-weight: 600; padding: 0.5rem 0.9rem; border-radius: 999px; text-decoration: none; }
  .ds-suggested-chip:hover { border-color: var(--ds-acc); }

  .ds-section { margin-top: 2.25rem; padding-top: 1.5rem; border-top: 1px solid var(--ds-border); }
  .ds-h2 { font-size: 1.15rem; font-weight: 700; color: #fff; margin: 0 0 0.6rem; }
  .ds-panel { background: var(--ds-bg2); border: 1px solid var(--ds-border); border-radius: 10px; padding: 1.1rem 1.3rem; margin-bottom: 0.85rem; }
  .ds-empty { color: var(--ds-muted); font-size: 0.85rem; padding: 1.5rem; text-align: center; background: var(--ds-bg2); border: 1px dashed var(--ds-border); border-radius: 10px; }

  .ds-executive-answer { font-size: 1.15rem; color: #fff; line-height: 1.6; background: var(--ds-bg2); border: 1px solid rgba(0,232,154,.25); border-left: 3px solid var(--ds-acc); border-radius: 10px; padding: 1.3rem 1.5rem; margin-bottom: 1.2rem; }

  .ds-chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
  .ds-chip { background: rgba(88,166,255,.1); color: var(--ds-info); border: 1px solid rgba(88,166,255,.25); padding: 0.24rem 0.7rem; border-radius: 999px; font-size: 0.74rem; font-weight: 600; }

  .ds-confidence-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-weight: 700; font-size: 0.8rem; padding: 0.4rem 0.9rem; border-radius: 999px; }
  .ds-confidence-HIGH { background: rgba(0,232,154,.12); color: var(--ds-acc); border: 1px solid rgba(0,232,154,.3); }
  .ds-confidence-MEDIUM { background: rgba(244,162,97,.12); color: var(--ds-warn); border: 1px solid rgba(244,162,97,.3); }
  .ds-confidence-LOW { background: rgba(230,57,70,.12); color: var(--ds-danger); border: 1px solid rgba(230,57,70,.3); }
  .ds-confidence-INSUFFICIENT_EVIDENCE { background: rgba(148,163,184,.12); color: var(--ds-muted); border: 1px solid var(--ds-border); }

  .ds-trace-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
  .ds-trace-step { display: inline-flex; align-items: center; gap: 0.35rem; background: var(--ds-bg2); border: 1px solid var(--ds-border); border-radius: 8px; padding: 0.45rem 0.8rem; font-size: 0.8rem; }
  .ds-trace-step.executed { border-color: rgba(0,232,154,.35); }
  .ds-trace-step.skipped { opacity: 0.45; }
  .ds-trace-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ds-muted); }
  .ds-trace-step.executed .ds-trace-dot { background: var(--ds-acc); }
  .ds-trace-arrow { color: var(--ds-muted); }

  .ds-ranking-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .ds-ranking-table th { text-align: left; color: var(--ds-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: .04em; padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--ds-border); }
  .ds-ranking-table td { padding: 0.55rem 0.7rem; border-bottom: 1px solid var(--ds-border); }
  .ds-ranking-table tr:first-child td { color: #fff; font-weight: 700; }

  .ds-evidence-card { background: var(--ds-bg2); border: 1px solid var(--ds-border); border-radius: 10px; padding: 0.9rem 1.1rem; margin-bottom: 0.6rem; }
  .ds-uncertainty-list { color: var(--ds-warn); font-size: 0.86rem; line-height: 1.7; padding-left: 1.2rem; margin: 0; }
  .ds-gap-list { color: var(--ds-danger); font-size: 0.86rem; line-height: 1.7; padding-left: 1.2rem; margin: 0; }

  .ds-chart-container { width: 100%; overflow-x: auto; margin-bottom: 1rem; }

  .ds-follow-up-form { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.8rem; }
  .ds-follow-up-chip { background: var(--ds-bg2); border: 1px solid var(--ds-border); color: var(--ds-text); font-size: 0.78rem; font-weight: 600; padding: 0.45rem 0.85rem; border-radius: 999px; cursor: pointer; }
  .ds-follow-up-chip:hover { border-color: var(--ds-acc); }

  .ds-btn { display: inline-block; padding: 0.55rem 1.1rem; border-radius: 8px; font-weight: 700; font-size: 0.82rem; text-decoration: none; background: var(--ds-acc); color: #06231a; border: 1px solid var(--ds-acc); cursor: pointer; }
  .ds-back { color: var(--ds-info); font-size: 0.85rem; text-decoration: none; display: inline-block; margin-bottom: 1rem; }

  @media (max-width: 720px) {
    .ds-wrap { padding: 1.5rem 1rem 3rem; }
    .ds-ask-form { flex-direction: column; }
    .ds-ranking-table { display: block; overflow-x: auto; white-space: nowrap; }
  }
</style>
